# ============================================================
#  FNO training configuration
#  Surrogate for the Phase Field Crystal (PFC) solver
# ============================================================
# Every knob the pipeline reads lives here. train_fno.py and
# evaluate_fno.py both load this file, so a run is fully described
# by (this config + the saved checkpoint).

# ----- Data -------------------------------------------------
data:
  data_dir: data            # folder of .npz trajectories (+ optional manifest.csv)
                            # (use data_pfc_large for the expanded generated set)
  val_frac: 0.15            # fraction of TRAJECTORIES held out for validation
  test_frac: 0.15           # fraction of TRAJECTORIES held out for testing
  split_seed: 0             # RNG seed for the shuffle/split
  split_by: trajectory      # 'trajectory' | 'config'. Use 'config' for ensemble
                            # datasets (--ensemble N): keeps all noise
                            # realizations of one (r, n0, seed_type) in the
                            # same split, preventing near-duplicate leakage.
  domain_L: 50.26548245744  # physical domain size (= 16*pi); only a fallback for
                            # the free-energy loss when dx/L aren't in the npz.
  normalize: true           # z-score the density field using train-set stats
  # --- conditioning (optional; keep false for the clean MSE baseline) ---
  include_conditioning: false   # append r, n0 as extra input channels
  normalize_conditioning: true  # z-score those conditioning channels

# ----- Model ------------------------------------------------
model:
  modes: 24                 # Fourier modes kept per spatial axis. 16 already
                            # captures 99.999% of CLEAN-lattice spectral energy
                            # (mode m = wavenumber k*8, L = 16*pi), but sharp,
                            # localized defects (grain boundaries, fronts) carry
                            # broadband content -- 24 gives the network headroom
                            # to represent them. Set back to 16 to ablate.
  width: 32                 # hidden channel width
  layers: 4                 # number of Fourier layers
  in_channels: 1            # density only; AUTO-bumped to 3 if conditioning on
  out_channels: 1           # predicted next density field
  use_grid: true            # append normalized (x, y) coordinate channels
  predict_delta: true       # predict the CHANGE dn and output n_t + dn
                            # (better conditioned; rollout starts at identity)
  enforce_mass: true        # project prediction to conserve mean(n) EXACTLY,
                            # matching PFC's conserved dynamics. Architectural
                            # constraint, not a loss term -- objective stays
                            # pure MSE. Set false to ablate the clean baseline.

# ----- Training ---------------------------------------------
train:
  epochs: 100
  batch_size: 32            # fits easily on a T4 / Apple GPU at 128x128;
                            # fewer, larger batches = less per-step overhead
  lr: 0.001
  weight_decay: 0.00001
  scheduler: cosine         # 'cosine' | 'step' | 'none'
  step_size: 30             # (only used if scheduler == 'step')
  gamma: 0.5                # (only used if scheduler == 'step')
  grad_clip: 1.0            # max grad norm (0 disables)
  # --- loss shaping (default 'none' = the clean MSE baseline) ---
  loss_weight_mode: delta   # 'none' | 'delta' | 'gradient'. 'delta' weights the
                            # MSE by |frame_t+1 - frame_t|, emphasizing growth
                            # fronts / reorganizing grains -- the regions where
                            # the surrogate locks in the wrong structure early.
  loss_alpha: 5.0           # weighting strength (0 recovers plain MSE)
  # --- multi-step / rollout training (1 = one-step teacher forcing) ---
  rollout_steps: 4          # unroll this many steps per training sample so the
                            # model sees its own error-compounding during
                            # training (directly targets early divergence)
  rollout_detach: true      # pushforward trick: feed back detached predictions
                            # (one-step gradients on the rollout distribution;
                            # stable). false = full backprop-through-time.
  rollout_discount: 1.0     # per-step loss weight = discount**step (<=1)
  # --- physics-informed free-energy dissipation penalty (step 1) ---
  physics_weight: 0.02      # weight on relu(relative free-energy increase). PFC
                            # is a gradient flow, so F[n] must not rise; this
                            # penalizes unphysical energy-increasing predictions.
                            # 0 = pure-data baseline. The term is dimensionless
                            # and ~0 on clean data, so it never fights correct
                            # predictions -- only unphysical ones.
                            # Retuned 0.1 -> 0.02: at 0.1 the penalty helped
                            # multi-grain coarsening but hurt clean hex/point
                            # lattices and stalled training early. 0.02 is the
                            # gentle dose meant to keep the grain benefit without
                            # the drag. See notebooks/03_physics_ablation.ipynb.
  num_workers: 0            # DataLoader workers (0 is safest on macOS/MPS)
  device: auto              # 'auto' | 'cuda' | 'mps' | 'cpu'
  seed: 0
  # --- early stopping ---
  early_stopping: true
  patience: 30              # bumped from 15: the grain run found its best val
                            # at ~epoch 2 and stopped at 17, but we couldn't
                            # tell whether it had truly converged or was just
                            # stuck in the phase-offset basin. A longer patience
                            # lets the full curve emerge (esp. after the cosine
                            # LR drops) so the plateau is real, not premature.
  min_delta: 0.000001       # minimum val-loss improvement that counts
  # --- rollout validation (logged during training; 0 disables) ---
  rollout_val_every: 10     # every N epochs, run autoregressive rollouts on
  rollout_val_trajs: 5      # this many val trajectories; logs multi-step MSE
                            # and final mass drift to console + TensorBoard

# ----- Logging / checkpoints --------------------------------
logging:
  out_dir: runs/fno_baseline
  ckpt_name: best.pt        # best-val checkpoint filename (under out_dir)
  last_name: last.pt        # most-recent checkpoint filename
  tensorboard: true         # write TensorBoard logs if the package is available
  log_every: 20             # print/log every N training batches

# ----- Evaluation -------------------------------------------
eval:
  rollout_length: 0         # 0 = roll out the full trajectory length
  num_vis_trajectories: 8   # how many test rollouts to visualize (the WORST
                            # by rollout MSE -- the informative failures)
  vis_frames: 6             # frames per rollout figure
  out_dir: runs/fno_baseline/eval
